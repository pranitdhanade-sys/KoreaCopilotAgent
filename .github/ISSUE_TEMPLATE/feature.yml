name: 💡 기능 요청 (Feature request)
description: 새로운 기능, 카드, 카테고리 또는 개선 아이디어를 제안해 주세요.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 기능 요청 양식
        새로운 에이전트 템플릿, 핸즈온, 프롬프트 등 카탈로그 추가 요청도 이곳에 남겨 주세요.

  - type: dropdown
    id: category
    attributes:
      label: 어떤 종류의 요청인가요?
      options:
        - 새 카드/콘텐츠 추가 요청 (에이전트, 핸즈온, 프롬프트, 스킬, 코스)
        - 기존 카드 수정/업데이트
        - 사이트 UI/UX 개선
        - 검색/필터 등 기능 추가
        - 문서/가이드 보강
        - 기타
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제 또는 필요를 해결하나요?
      description: 현재 어떤 점이 불편하거나 부족한지 알려주세요.
      placeholder: 예) 한국어 사용자에게 적합한 회의록 작성 에이전트 템플릿이 없습니다.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 해결책
      description: 어떤 기능/콘텐츠가 추가되거나 바뀌면 좋을지 구체적으로 적어 주세요.
      placeholder: 예) Teams 회의록을 자동 요약해 SharePoint에 저장하는 에이전트 템플릿 추가.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 고려해 본 대안
      description: 다른 방법이나 우회책이 있다면 알려주세요. (선택)
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 참고 자료 / 추가 컨텍스트
      description: 관련 링크, 스크린샷, 사용 시나리오 등을 자유롭게 적어 주세요. (선택)
    validations:
      required: false
